# offload configuration for running mngr release tests on Modal
[offload]
max_parallel = 1
test_timeout_secs = 120
sandbox_project_root = "/code/mngr"
sandbox_init_cmd = "git apply /offload-upload/patch --allow-empty && uv sync --all-packages"

[provider]
type = "modal"
dockerfile = "libs/mngr/imbue/mngr/resources/Dockerfile.release"

[provider.experimental_options]
enable_docker = true

[framework]
type = "pytest"
paths = ["."]
command = "uv run pytest"
run_args = "--no-cov -p no:xdist -o addopts="

[groups.all]
retry_count = 0
# Run only release+docker tests; narrow to one specific test for verification
filters = "-m 'release and docker' -k 'test_multiple_snapshots_ordering'"

[report]
output_dir = "test-results"
junit = true
junit_file = "junit.xml"
