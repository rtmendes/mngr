# offload configuration for running mngr release tests on Modal
[offload]
max_parallel = 200
test_timeout_secs = 900
retry_count = 2
stream_output = true
sandbox_project_root = "/code/mngr"

[provider]
type = "modal"
dockerfile = "libs/mngr/imbue/mngr/resources/Dockerfile.release"

[provider.env]
PYTEST_MAX_DURATION_SECONDS = "900"

[provider.experimental_options]
enable_docker = true

[checkpoint]
build_inputs = [
    "libs/mngr/imbue/mngr/resources/Dockerfile",
    "libs/mngr/imbue/mngr/resources/Dockerfile.release.extras",
    "libs/mngr/imbue/mngr/resources/start-dockerd.sh",
    "pyproject.toml",
    "uv.lock",
]

[framework]
type = "pytest"
paths = ["."]
command = "uv run pytest"
run_args = "--no-cov -p no:xdist --timeout=900 -o addopts="

[groups.all]
retry_count = 4
# Exclude docker/docker_sdk release tests -- those run in the dedicated
# `test-docker-release` CI job on a GitHub runner with a real Docker daemon,
# since Docker-in-Docker under gVisor is too flaky (dockerd startup races,
# intermittent container networking). Non-docker release tests run here.
filters = "-m 'release and not docker and not docker_sdk'"

[report]
output_dir = "test-results"
junit = true
junit_file = "junit.xml"
download_globs = [".test_output/**"]
