# offload configuration for running mng tests on Modal
[offload]
max_parallel = 50
test_timeout_secs = 60
stream_output = true
sandbox_project_root = "/code/mng"
sandbox_init_cmd = "git apply /offload-upload/patch --allow-empty && uv sync --all-packages"

[provider]
type = "modal"
dockerfile = "libs/mng/imbue/mng/resources/Dockerfile"

[framework]
type = "default"
discover_command = "uv run pytest --collect-only -q {filters} 2>/dev/null | grep '::'"
# Run tests in the sandbox (source is baked into /app)
run_command = "uv run pytest -v --tb=short --no-cov -p no:xdist -o addopts= --junitxml={result_file} {tests}"
test_id_format = "{name}"

[groups.all]
retry_count = 0
# Exclude acceptance and release tests
filters = "-m 'not acceptance and not release'"

[report]
output_dir = "test-results"
junit = true
junit_file = "junit.xml"
