name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0). Must match the mngr version in pyproject.toml.'
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install build dependencies
        run: uv tool install build

      - name: Verify versions and pin consistency
        run: |
          # Determine expected mngr version from tag or workflow_dispatch input
          EXPECTED=""
          if [ "${{ github.ref_type }}" = "tag" ]; then
            EXPECTED="${{ github.ref_name }}"
            EXPECTED="${EXPECTED#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            EXPECTED="${{ inputs.version }}"
          fi

          if [ -n "$EXPECTED" ]; then
            uv run scripts/verify_publish.py --expected-mngr-version "$EXPECTED"
          else
            uv run scripts/verify_publish.py
          fi

      - name: Build all packages
        run: |
          set -euo pipefail
          pkg_dirs_output=$(uv run scripts/verify_publish.py --list-package-dirs)
          mapfile -t pkg_dirs <<< "$pkg_dirs_output"
          for pkg_dir in "${pkg_dirs[@]}"; do
            echo "::group::Build $pkg_dir"
            pyproject-build "$pkg_dir" -o dist/
            echo "::endgroup::"
          done

      - name: Publish packages to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
