# Mapping of latchkey service names to detent permission schemas.
#
# Each table entry corresponds to a service exposed by latchkey. The keys are:
#
#   display_name        Human-readable label shown in the permission dialog.
#   scope_schemas       Detent scope schemas this service owns. Used as rule
#                       keys in the agent's permissions.json.
#   permission_schemas  Detent permission schemas the user can grant. Used as
#                       rule values. Order is reflected in the dialog.
#
# The detent ``any`` schema is always added as the first checkbox at runtime
# and is the implicit default; do not list it here.
#
# All schema names below come from detent's built-in catalog
# (imbue-ai/detent docs/builtin-schemas.md). Keep this file in sync with
# upstream detent and latchkey.

[services.slack]
display_name = "Slack"
scope_schemas = ["slack-api"]
permission_schemas = [
  "slack-read-all",
  "slack-write-all",
  "slack-chat-read",
  "slack-chat-write",
  "slack-conversations-read",
  "slack-conversations-write",
  "slack-users-read",
  "slack-users-write",
  "slack-files-read",
  "slack-files-write",
  "slack-reactions-read",
  "slack-reactions-write",
  "slack-search",
  "slack-pins-read",
  "slack-pins-write",
  "slack-bookmarks-read",
  "slack-bookmarks-write",
  "slack-reminders-read",
  "slack-reminders-write",
]

