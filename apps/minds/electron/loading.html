<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minds</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      -webkit-app-region: drag;
      user-select: none;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 32px;
    }
    .logo svg {
      width: 100%;
      height: 100%;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #f8fafc;
    }
    .status {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 24px;
      min-height: 20px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #334155;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="logo">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#3b82f6" stroke-width="3"/>
      <path d="M30 55 C30 35, 50 25, 50 25 C50 25, 70 35, 70 55 C70 70, 55 75, 50 75 C45 75, 30 70, 30 55Z"
            fill="none" stroke="#3b82f6" stroke-width="2.5"/>
      <path d="M40 50 C40 42, 50 35, 50 35 C50 35, 60 42, 60 50 C60 58, 55 62, 50 62 C45 62, 40 58, 40 50Z"
            fill="#3b82f6" opacity="0.3"/>
      <circle cx="50" cy="48" r="4" fill="#3b82f6"/>
    </svg>
  </div>
  <h1>Minds</h1>
  <p class="status" id="status">Starting...</p>
  <div class="spinner"></div>

  <script>
    if (window.minds) {
      window.minds.onStatusUpdate((message) => {
        document.getElementById('status').textContent = message;
      });
    }
  </script>
</body>
</html>
