<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minds - Error</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 32px;
      -webkit-app-region: drag;
      user-select: none;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 12px;
    }
    .message {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 24px;
      text-align: center;
      max-width: 400px;
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      -webkit-app-region: no-drag;
    }
    button {
      padding: 8px 20px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      font-weight: 500;
    }
    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }
    .btn-primary:hover {
      background: #2563eb;
    }
    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }
    .btn-secondary:hover {
      background: #475569;
    }
    .toggle-details {
      background: none;
      border: none;
      color: #64748b;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
      margin-bottom: 12px;
      -webkit-app-region: no-drag;
    }
    .toggle-details:hover {
      color: #94a3b8;
    }
    .details {
      display: none;
      width: 100%;
      max-width: 600px;
      max-height: 200px;
      overflow: auto;
      background: #1e293b;
      border-radius: 8px;
      padding: 16px;
      font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, monospace;
      font-size: 12px;
      color: #94a3b8;
      white-space: pre-wrap;
      word-break: break-all;
      -webkit-app-region: no-drag;
      user-select: text;
    }
    .details.visible {
      display: block;
    }
  </style>
</head>
<body>
  <h1>Something went wrong</h1>
  <p class="message" id="message">Minds stopped unexpectedly.</p>
  <div class="actions">
    <button class="btn-primary" id="retry-btn">Retry</button>
    <button class="btn-secondary" id="log-btn">View full log</button>
  </div>
  <button class="toggle-details" id="toggle-btn">Show details</button>
  <pre class="details" id="details"></pre>

  <script>
    const detailsEl = document.getElementById('details');
    const toggleBtn = document.getElementById('toggle-btn');
    const messageEl = document.getElementById('message');

    toggleBtn.addEventListener('click', () => {
      detailsEl.classList.toggle('visible');
      toggleBtn.textContent = detailsEl.classList.contains('visible')
        ? 'Hide details' : 'Show details';
    });

    document.getElementById('retry-btn').addEventListener('click', () => {
      if (window.minds) window.minds.retry();
    });

    document.getElementById('log-btn').addEventListener('click', () => {
      if (window.minds) window.minds.openLogFile();
    });

    if (window.minds) {
      window.minds.onErrorDetails((data) => {
        if (data.message) messageEl.textContent = data.message;
        if (data.details) detailsEl.textContent = data.details;
      });
    }
  </script>
</body>
</html>
