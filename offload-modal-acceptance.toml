# offload configuration for running mngr acceptance tests on Modal
[offload]
max_parallel = 200
test_timeout_secs = 60
retry_count = 2
stream_output = true
sandbox_project_root = "/code/mngr"
sandbox_init_cmd = "git apply /offload-upload/patch --allow-empty && uv sync --all-packages && mkdir -p /etc/docker && echo '{\"registry-mirrors\": [\"https://imbue--keystone-docker-hub-mirror-q7x3p-registry.modal.run\"]}' > /etc/docker/daemon.json && /start_dockerd.sh & /wait_for_docker.sh"

[provider]
type = "modal"
dockerfile = "libs/mngr/imbue/mngr/resources/Dockerfile"

[provider.experimental_options]
enable_docker = true

[framework]
type = "pytest"
paths = ["."]
command = "uv run pytest"
run_args = "--no-cov -p no:xdist -o addopts="

[groups.all]
retry_count = 4
# Exclude release tests from the acceptance suite.
filters = "-m'not release'"

[report]
output_dir = "test-results"
junit = true
junit_file = "junit.xml"
download_globs = [".test_output/**"]
