# offload configuration for running mngr acceptance tests on Modal
[offload]
max_parallel = 200
test_timeout_secs = 60
retry_count = 2
stream_output = true
sandbox_project_root = "/code/mngr"
sandbox_init_cmd = "git apply /offload-upload/patch --allow-empty && uv sync --all-packages"

[provider]
type = "modal"
dockerfile = "libs/mngr/imbue/mngr/resources/Dockerfile"

[framework]
type = "pytest"
paths = ["."]
command = "uv run pytest"
run_args = "--no-cov -p no:xdist -o addopts="

[groups.all]
retry_count = 4
# Exclude release tests from the acceptance suite. Exclude docker tests because Modal support for Docker is in ALPHA state.
filters = "-m'not release and not docker'"

[report]
output_dir = "test-results"
junit = true
junit_file = "junit.xml"
