# offload configuration for running mngr acceptance tests on Modal
[offload]
max_parallel = 200
test_timeout_secs = 900
retry_count = 2
stream_output = true
sandbox_project_root = "/code/mngr"

[provider]
type = "modal"
dockerfile = "libs/mngr/imbue/mngr/resources/Dockerfile"

[provider.experimental_options]
enable_docker = true

[checkpoint]
build_inputs = [
    "libs/mngr/imbue/mngr/resources/Dockerfile",
    "pyproject.toml",
    "uv.lock",
]

[framework]
type = "pytest"
paths = ["."]
command = "uv run pytest"
run_args = "--no-cov -p no:xdist"

[groups.all]
retry_count = 4
# Exclude docker/docker_sdk tests -- they need a Docker daemon which Modal sandboxes don't have.
# Those tests run in a separate GitHub runner job (test-docker) until offload Docker-in-Docker support lands.
filters = "-m 'acceptance and not docker and not docker_sdk'"

[report]
output_dir = "test-results"
junit = true
junit_file = "junit.xml"
download_globs = [".test_output/**"]
