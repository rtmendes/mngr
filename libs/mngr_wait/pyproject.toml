[project]
name = "imbue-mngr-wait"
version = "0.1.0"
description = "Wait plugin for mngr - wait for agents/hosts to reach target states"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "imbue-mngr==0.1.7",
    "click-option-group>=0.5.6",
]

[project.entry-points.mngr]
wait = "imbue.mngr_wait.plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["imbue"]

[tool.uv.sources]
imbue-mngr = { workspace = true }

[tool.pyright]
venvPath = "../.."
venv = ".venv"
pythonVersion = "3.11"
strict = ["**/*.py"]

[tool.pytest.ini_options]
timeout_func_only = true
pythonpath = ["."]
testpaths = ["."]
addopts = [
    "--cov=imbue.mngr_wait",
    "--cov-report=term-missing",
    "--cov-fail-under=80",
    "--timeout=30",
]

[tool.coverage.run]
source = ["imbue.mngr_wait"]
omit = [
    "*_test.py",
    "test_*.py",
    "*/conftest.py",
]

[tool.coverage.report]
exclude_lines = [
    "assert_never",
]
