[project]
name = "imbue-mngr-forward"
version = "0.1.0"
description = "Auth + subdomain-forwarding plugin for mngr"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "imbue-mngr",
    "imbue-common",
    "concurrency-group",
    "click",
    "click-option-group",
    "fastapi>=0.115",
    "uvicorn>=0.30",
    "websockets>=13",
    "httpx>=0.27.0",
    "itsdangerous>=2.1",
    "jinja2>=3.1",
    "paramiko>=3.0",
    "loguru",
    "pluggy",
    "pydantic>=2.0",
]

[project.entry-points.mngr]
forward = "imbue.mngr_forward.plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["imbue"]
exclude = ["*_test.py", "test_*.py", "**/conftest.py", "**/testing.py"]

[tool.uv.sources]
imbue-mngr = { workspace = true }
imbue-common = { workspace = true }
concurrency-group = { workspace = true }

[tool.pytest.ini_options]
timeout_func_only = true
junit_family = "xunit1"
testpaths = ["."]
addopts = [
  "--cov=imbue.mngr_forward",
  "--cov-report=term-missing",
  "--cov-report=xml",
  "--durations=20",
  "--timeout=10",
  "--timeout-method=signal",
  "--slow-tests-to-file",
  "--coverage-to-file",
]

[tool.coverage.run]
parallel = true
concurrency = ["multiprocessing"]
omit = [
  "*_test.py",
  "test_*.py",
  "*/tests/*",
  "*/conftest.py",
]

[tool.coverage.report]
fail_under = 50
omit = [
  "*_test.py",
  "test_*.py",
  "*/tests/*",
  "*/conftest.py",
]

[tool.pyright]
venvPath = "../.."
venv = ".venv"
pythonVersion = "3.11"
strict = ["**/*.py"]
