[project]
name = "imbue-mngr-diagnose"
version = "0.1.0"
description = "Diagnose plugin for mngr - launch an agent to diagnose bugs and prepare GitHub issues"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "imbue-mngr==0.2.4",
]

[project.entry-points.mngr]
diagnose = "imbue.mngr_diagnose.plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["imbue"]

[tool.uv.sources]
imbue-mngr = { workspace = true }

[tool.pyright]
venvPath = "../.."
venv = ".venv"
pythonVersion = "3.12"
strict = ["**/*.py"]

[tool.pytest.ini_options]
timeout_func_only = true
pythonpath = ["."]
testpaths = ["."]
addopts = [
    "--cov=imbue.mngr_diagnose",
    "--cov-report=term-missing",
    "--cov-fail-under=95",
    "--timeout=30",
]

[tool.coverage.run]
source = ["imbue.mngr_diagnose"]
omit = [
    "*_test.py",
    "test_*.py",
    "*/conftest.py",
]

[tool.coverage.report]
exclude_lines = [
    "assert_never",
]
