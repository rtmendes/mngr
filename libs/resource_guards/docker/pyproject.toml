[project]
name = "resource-guards-docker"
version = "0.1.0"
description = "Docker CLI and SDK resource guards for pytest"
requires-python = ">=3.11"
license = "MIT"
authors = [
    {name = "Imbue"},
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
]
dependencies = [
    "resource-guards==0.1.0",
    "docker>=7.1.0",
]

[project.optional-dependencies]
dev = ["inline-snapshot>=0.13"]

[project.urls]
Homepage = "https://github.com/imbue-ai/mng"
Repository = "https://github.com/imbue-ai/mng"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["imbue"]
exclude = ["*_test.py", "test_*.py", "**/conftest.py"]

[tool.uv.sources]
resource-guards = { workspace = true }

[tool.pyright]
venvPath = "../../.."
venv = ".venv"
pythonVersion = "3.11"
strict = ["**/*.py"]
